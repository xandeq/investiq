name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      # Minimal env — conftest.py generates JWT keys at runtime;
      # DB is SQLite in-memory (no Postgres needed for most tests).
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      BRAPI_TOKEN: ""
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          python -m pytest \
            --tb=short \
            -q \
            --ignore=tests/test_rls.py \
            -x
