[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning:asyncio
    ignore::DeprecationWarning:slowapi
    ignore:.*DefaultEventLoopPolicy.*:DeprecationWarning
    ignore:.*iscoroutinefunction.*:DeprecationWarning
    ignore:.*default date adapter.*:DeprecationWarning
